# Chains — sequential pipelines where each step feeds into the next
#
# Each step has:
#   agent: which agent runs this step
#   prompt: what the agent is asked to do
#     $ORIGINAL = the user's original request
#     $INPUT    = the output from the previous step
#
# The chain's final output is the last step's result.

# ── Document Creation Chains ──────────────────────────────────────

# Create a BRD: scout the landscape, then draft with PM persona
create-brd:
  - agent: scout
    prompt: >
      Scan the docs/ directory for phase context. Read the DOCUMENT_MATRIX.md
      to understand what phase this BRD is for. Check if a BRD already exists.
      Report: existing docs for this phase, any prior BRD, and relevant
      context from the codebase. Original request: $ORIGINAL

  - agent: pm
    prompt: >
      Based on the scout's findings below, create a BRD using the write-brd
      skill. Follow the template at docs/templates/BRD_TEMPLATE.md exactly.
      Use the scout's context to inform the business problem and current state.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: doc-reviewer
    prompt: >
      Review the BRD that was just created. Check it against the template
      for completeness. Report any critical issues that must be fixed
      before this can move to "In Review" status.

      Previous step output:
      $INPUT

# Create a Tech Spec: scout code + PRD, then draft, then review
create-tech-spec:
  - agent: scout
    prompt: >
      Read the PRD and any ADRs for context. Scan the relevant source code
      files that will be modified. Report: PRD requirements, existing code
      patterns, ADR decisions, and upstream document status.
      Original request: $ORIGINAL

  - agent: tech-lead
    prompt: >
      Based on the scout's findings, create a Tech Spec using the
      write-tech-spec skill. Ensure the architecture diagram reflects
      actual code patterns found by the scout. Follow the template at
      docs/templates/TECH_SPEC_TEMPLATE.md.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: doc-reviewer
    prompt: >
      Review the Tech Spec for completeness and quality. Check: architecture
      diagram exists, concurrency model is explicit, error handling classifies
      all categories, feature flags have cleanup dates.

      Previous step output:
      $INPUT

# Create a Security Review: audit code, then write review
create-sec-review:
  - agent: security-auditor
    prompt: >
      Scan the code and specs related to this feature. Identify: new
      endpoints, external API calls, data flows crossing trust boundaries,
      PII handling, tenant isolation points. Report all findings.
      Original request: $ORIGINAL

  - agent: security
    prompt: >
      Based on the security audit findings, create a Security Review using
      the write-sec-review skill. Use the audit findings to populate the
      threat model and attack surface sections. Follow the template at
      docs/templates/SEC_REVIEW_TEMPLATE.md.

      Audit findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: doc-reviewer
    prompt: >
      Review the Security Review for completeness. Verify: risk scoring
      uses L x I matrix, AI/LLM section covers all 7 threat categories,
      compliance mapping has specific control IDs, pen testing is scheduled
      if risk is High/Critical.

      Previous step output:
      $INPUT

# ── Review Chains ─────────────────────────────────────────────────

# Review all docs for a phase
review-phase:
  - agent: scout
    prompt: >
      Inventory all documents for the requested phase. For each document,
      note: type, status, last modified date, file path. Also check
      gate readiness using doc_gate_check.
      Original request: $ORIGINAL

  - agent: doc-reviewer
    prompt: >
      For each document found by the scout, perform a quality review.
      Prioritize documents in "Draft" status. For each, report: grade,
      critical issues, and recommended actions.

      Scout inventory:
      $INPUT

  - agent: gate-checker
    prompt: >
      Based on the document inventory and reviews, produce a final
      gate readiness report. For each gate, state PASS or BLOCKED
      with specific action items and responsible roles.

      Previous findings:
      $INPUT

# Security audit pipeline
security-pipeline:
  - agent: scout
    prompt: >
      Map the attack surface: find all API endpoints, external service
      calls, auth middleware, data access patterns, and PII handling.
      Report file paths and line numbers.
      Original request: $ORIGINAL

  - agent: security-auditor
    prompt: >
      Using the scout's attack surface map, run a focused security scan.
      Check each identified surface for: injection vulnerabilities, auth
      bypass, tenant isolation, secret exposure, and data leakage.

      Attack surface map:
      $INPUT

  - agent: security
    prompt: >
      Synthesize the audit findings into a structured security assessment.
      Classify each finding by OWASP category, assign risk scores using
      Likelihood x Impact, and recommend specific mitigations.

      Audit findings:
      $INPUT

# ── Implementation Chains ─────────────────────────────────────────

# Build a backend feature end-to-end: scout → implement → test → review
build-backend-feature:
  - agent: scout
    prompt: >
      Read the Tech Spec and ID Spec for this feature. Scan the existing
      backend code to find: relevant models, repositories, services, and
      API routes. Report the file paths, existing patterns, and what needs
      to be created vs modified.
      Original request: $ORIGINAL

  - agent: backend-dev
    prompt: >
      Based on the scout's findings, implement this feature following TDD.
      For each new component: write the test first, then the implementation.
      Follow the existing patterns found by the scout. Match the ID Spec
      API contract exactly.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: test-engineer
    prompt: >
      Review the tests written by the backend developer. Add any missing
      test cases: tenant isolation tests, edge cases, error scenarios.
      Run the full test suite with `pytest tests/ -v` and report results.

      Implementation:
      $INPUT

  - agent: code-reviewer
    prompt: >
      Review the implementation against the Tech Spec and ID Spec.
      Check: spec compliance, security (tenant isolation, injection,
      PII logging), code quality, test coverage, performance.
      Produce a structured review.

      Implementation and tests:
      $INPUT

# Build a frontend feature: scout → implement → test → review
build-frontend-feature:
  - agent: scout
    prompt: >
      Read the PRD for UX requirements and the ID Spec for API contracts.
      Scan the existing frontend code to find: relevant components, hooks,
      stores, and services. Report file paths and patterns.
      Original request: $ORIGINAL

  - agent: frontend-dev
    prompt: >
      Based on the scout's findings, implement this feature. For each
      component: write the test first, then the implementation. Handle
      all 5 UI states. Match the ID Spec API shapes exactly. Ensure
      WCAG 2.1 AA accessibility.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: test-engineer
    prompt: >
      Review the frontend tests. Add missing cases: accessibility tests,
      error state rendering, loading states, edge cases (empty data, large
      datasets). Run `npm test` and report results.

      Implementation:
      $INPUT

  - agent: code-reviewer
    prompt: >
      Review the frontend implementation against the PRD and ID Spec.
      Check: spec compliance, accessibility, all 5 UI states handled,
      type safety (no `any`), performance (bundle impact), pattern
      consistency. Produce a structured review.

      Implementation and tests:
      $INPUT

# Build an AI feature: scout → AI engineer → test/eval → security → review
build-ai-feature:
  - agent: scout
    prompt: >
      Read the Tech Spec (AI sections) and PRD (AI behavior requirements).
      Scan the existing AI code in backend/app/ai/. Find: existing tools,
      prompts, providers, and eval harnesses. Report structure and patterns.
      Original request: $ORIGINAL

  - agent: ai-engineer
    prompt: >
      Based on the scout's findings, implement this AI feature. Build
      eval first (ground truth + metrics), then implement the prompts/tools,
      then run eval to verify quality. Track cost per invocation. Ground
      all outputs to source text.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: test-engineer
    prompt: >
      Review and extend the eval harness and tests. Verify: accuracy
      metrics meet thresholds from the PRD, cost is within budget,
      hallucination detection is in place. Run the eval suite and
      report results.

      Implementation:
      $INPUT

  - agent: security-auditor
    prompt: >
      Audit the AI implementation for: prompt injection vulnerabilities,
      data sent to external APIs, PII in prompts, tenant isolation in
      tool calls, cost abuse potential.

      Implementation:
      $INPUT

  - agent: code-reviewer
    prompt: >
      Review the full AI implementation: code quality, eval methodology,
      cost tracking, grounding strategy, security audit results.
      Produce a structured review.

      Implementation, eval results, and security audit:
      $INPUT

# Full-stack feature: spec → backend → frontend → integration test
build-fullstack-feature:
  - agent: scout
    prompt: >
      Read all specs for this feature: PRD, Tech Spec, ID Spec, Test Spec.
      Map out what needs to be built on backend and frontend. Report the
      full implementation scope.
      Original request: $ORIGINAL

  - agent: backend-dev
    prompt: >
      Implement the backend: API endpoints, services, repositories, models.
      Follow TDD. Match the ID Spec exactly. Include tenant isolation.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: frontend-dev
    prompt: >
      Implement the frontend: components, hooks, services, pages. Consume
      the API endpoints built by the backend developer. Match the PRD UX
      requirements. Handle all 5 UI states.

      Backend implementation:
      $INPUT

      Original request: $ORIGINAL

  - agent: test-engineer
    prompt: >
      Write integration tests that verify frontend and backend work together.
      Test the full flow: user action → API call → database → response → UI.
      Run all tests (pytest + vitest) and report results.

      Full implementation:
      $INPUT

  - agent: code-reviewer
    prompt: >
      Review the full-stack implementation. Check: backend/frontend
      consistency, API contract adherence, test coverage, security,
      accessibility, performance. Produce a single structured review.

      Full implementation and test results:
      $INPUT

# Database migration: implement → test → verify
run-migration:
  - agent: scout
    prompt: >
      Read the Tech Spec for schema changes and the Mig Guide for the
      migration procedure. Check the current Alembic migration history.
      Report: what changes are needed, existing migration state, risks.
      Original request: $ORIGINAL

  - agent: devops
    prompt: >
      Based on the scout's findings, create and run the Alembic migration.
      Generate the migration file, review the auto-generated SQL, run it
      against the local database, verify with `alembic current`.

      Scout findings:
      $INPUT

      Original request: $ORIGINAL

  - agent: test-engineer
    prompt: >
      Verify the migration: run the full test suite to check nothing broke,
      verify data integrity with the validation queries from the Mig Guide,
      test rollback with `alembic downgrade`.

      Migration:
      $INPUT

# ── Planning Chains ───────────────────────────────────────────────

# Plan documentation for a phase
plan-phase-docs:
  - agent: scout
    prompt: >
      Read DOCUMENT_MATRIX.md for the requested phase. Scan docs/ for
      existing documents. Report: what's required, what exists, what's
      missing, and current gate status.
      Original request: $ORIGINAL

  - agent: gate-checker
    prompt: >
      Based on the scout's findings, check all gates for this phase.
      For each missing document, identify: doc type, responsible role,
      upstream dependencies, and whether the upstream deps exist.

      Scout findings:
      $INPUT

  - agent: pm
    prompt: >
      Based on the gate check results, produce a prioritized documentation
      plan. Order documents by: (1) what unblocks the most gates, (2) what
      has all upstream dependencies met, (3) what the team can parallelize.
      Assign ownership based on role-to-document mapping.

      Gate check results:
      $INPUT
