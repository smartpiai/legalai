# Routing Rules — maps input patterns to agent compositions
#
# The orchestrator uses these rules to decide how to handle requests.
# Rules are evaluated top-to-bottom; first match wins.
# More specific patterns should come before generic ones.
#
# Route types:
#   chain:  Sequential pipeline (agents run in order)
#   team:   Parallel group (agents run simultaneously)
#   agent:  Single agent (direct invocation)
#   decompose: Break into sub-tasks, each routed independently

# ── Phase-level operations ──────────────────────────────────────

- match: "(get|prepare|ready) phase (\\d+)"
  route: chain
  target: plan-phase-docs
  description: "Plan and track all documentation for a phase"

- match: "(phase|gate) (\\d+) (status|ready|check)"
  route: team
  target: doc-review
  description: "Multi-perspective phase readiness assessment"

# ── Document creation ───────────────────────────────────────────

- match: "(write|create|draft) (a )?brd"
  route: chain
  target: create-brd
  description: "Full BRD creation pipeline"

- match: "(write|create|draft) (a )?tech.?spec"
  route: chain
  target: create-tech-spec
  description: "Full Tech Spec creation pipeline"

- match: "(write|create|draft) (a )?(sec|security).?review"
  route: chain
  target: create-sec-review
  description: "Full Security Review pipeline with audit"

- match: "(write|create|draft) (a )?(prd|product.?req)"
  route: agent
  target: pm
  skill: write-prd
  description: "PRD creation with PM persona"

- match: "(write|create|draft) (a )?adr"
  route: agent
  target: tech-lead
  skill: write-adr
  description: "ADR creation with Tech Lead persona"

- match: "(write|create|draft) (a )?test.?spec"
  route: agent
  target: qa
  skill: write-test-spec
  description: "Test Spec creation with QA persona"

- match: "(write|create|draft) (a )?id.?spec"
  route: agent
  target: engineer
  skill: write-id-spec
  description: "ID Spec creation with Engineer persona"

- match: "(write|create|draft) (a )?runbook"
  route: agent
  target: sre
  skill: write-runbook
  description: "Runbook creation with SRE persona"

- match: "(write|create|draft) (a )?mig(ration)?.?guide"
  route: agent
  target: sre
  skill: write-mig-guide
  description: "Migration Guide creation with SRE persona"

- match: "(write|create|draft) (a )?dep(endency)?.?review"
  route: agent
  target: engineer
  skill: write-dep-review
  description: "Dep Review creation with Engineer persona"

- match: "(write|create|draft) (a )?perf(ormance)?.?spec"
  route: agent
  target: sre
  skill: write-perf-spec
  description: "Perf Spec creation with SRE persona"

# ── Review operations ───────────────────────────────────────────

- match: "review (all|docs|documents) (for )?phase (\\d+)"
  route: chain
  target: review-phase
  description: "Full phase documentation review"

- match: "review .+\\.md"
  route: agent
  target: doc-reviewer
  skill: review-doc
  description: "Single document quality review"

# ── Implementation operations ───────────────────────────────────

- match: "(build|implement|code|create) .*(endpoint|api|route|service|repository|model)"
  route: chain
  target: build-backend-feature
  description: "Full backend feature build pipeline"

- match: "(build|implement|code|create) .*(component|page|ui|frontend|form|dashboard|widget)"
  route: chain
  target: build-frontend-feature
  description: "Full frontend feature build pipeline"

- match: "(build|implement|code|create) .*(agent|tool|prompt|embedding|retrieval|rag|eval)"
  route: chain
  target: build-ai-feature
  description: "Full AI feature build pipeline"

- match: "(build|implement) .*(full.?stack|feature|end.?to.?end)"
  route: chain
  target: build-fullstack-feature
  description: "Full-stack feature implementation pipeline"

- match: "(run|create|apply) .*(migration|alembic|schema)"
  route: chain
  target: run-migration
  description: "Database migration pipeline"

- match: "(write|add|create) .*(test|spec test|unit test|integration test)"
  route: agent
  target: test-engineer
  description: "Test writing with test engineer"

- match: "(review|check) .*(code|pr|pull request|implementation)"
  route: team
  target: code-review
  description: "Multi-perspective code review"

- match: "(deploy|docker|compose|infrastructure|ci|cd|pipeline)"
  route: agent
  target: devops
  description: "DevOps and infrastructure work"

# ── Security operations ─────────────────────────────────────────

- match: "(security|vulnerability|audit|scan|pentest)"
  route: chain
  target: security-pipeline
  description: "Full security assessment pipeline"

# ── Exploration / information ───────────────────────────────────

- match: "(what|which|how many) (docs|documents)"
  route: agent
  target: scout
  description: "Documentation inventory and exploration"

- match: "(find|search|where|locate|explain|how does)"
  route: agent
  target: scout
  description: "Codebase exploration"

# ── Multi-document operations ───────────────────────────────────

- match: "(all docs|everything|full set) for phase (\\d+)"
  route: decompose
  target: phase-orchestrator
  description: "Decompose into per-document chains with dependency ordering"

# ── Sprint operations ─────────────────────────────────────────

- match: "(plan|start|create)\\s+sprint"
  route: agent
  target: sprint-orchestrator
  description: "Auto-plan a sprint from roadmap"

- match: "(sprint|backlog|velocity|standup|retro)"
  route: agent
  target: sprint-orchestrator
  description: "Sprint planning, tracking, and execution"

# ── Fallback ────────────────────────────────────────────────────

- match: ".*"
  route: agent
  target: default
  description: "Default agent — no persona, full tool access"
