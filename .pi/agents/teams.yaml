# Teams — named groups of agents that work in parallel
#
# Usage: invoke a team when you need multiple perspectives simultaneously.
# Each agent in the team receives the same input and produces independent output.

# ── Documentation Teams ─────────────────────────────────────────

# Full documentation review
doc-review:
  - scout
  - doc-reviewer
  - gate-checker

# Spec review before implementation starts
spec-review:
  - doc-reviewer
  - security-auditor
  - gate-checker

# ── Implementation Teams ────────────────────────────────────────

# Full code review — multiple perspectives on the same code
code-review:
  - code-reviewer
  - security-auditor

# Pre-implementation recon — understand the landscape before building
recon:
  - scout
  - gate-checker

# Full build squad — everyone involved in shipping a feature
build-squad:
  - backend-dev
  - frontend-dev
  - test-engineer

# AI feature squad
ai-squad:
  - ai-engineer
  - test-engineer
  - security-auditor

# Infrastructure squad
infra-squad:
  - devops
  - sre
  - security-auditor

# ── Security Teams ──────────────────────────────────────────────

# Full security assessment
security-full:
  - scout
  - security-auditor
  - security
