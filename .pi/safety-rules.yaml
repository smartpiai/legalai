# Safety Rules — system and process protection
#
# Loaded by the damage-control extension pattern.
# Three layers: dangerous commands, untouchable files, read-only files.

# ── Dangerous bash commands (require confirmation) ──────────────

bashToolPatterns:
  # Destructive file operations
  - pattern: "rm\\s+(-rf?|--recursive)"
    reason: "Recursive delete can destroy project data"
    ask: true
  - pattern: "rm\\s+.*\\*"
    reason: "Wildcard delete is dangerous"
    ask: true

  # Git destructive operations
  - pattern: "git\\s+push\\s+.*--force"
    reason: "Force push can overwrite shared history"
    ask: true
  - pattern: "git\\s+reset\\s+--hard"
    reason: "Hard reset discards uncommitted changes"
    ask: true
  - pattern: "git\\s+clean\\s+-[dDfFxX]"
    reason: "Git clean deletes untracked files permanently"
    ask: true
  - pattern: "git\\s+branch\\s+-D"
    reason: "Force-deletes a branch even if unmerged"
    ask: true
  - pattern: "git\\s+rebase"
    reason: "Rebase rewrites history — confirm intent"
    ask: true

  # Database destructive operations
  - pattern: "DROP\\s+(TABLE|DATABASE|INDEX|SCHEMA)"
    reason: "Dropping database objects is irreversible"
    ask: true
  - pattern: "TRUNCATE\\s+TABLE"
    reason: "Truncate deletes all rows without logging"
    ask: true
  - pattern: "DELETE\\s+FROM\\s+\\w+\\s*$"
    reason: "DELETE without WHERE clause deletes all rows"
    ask: true
  - pattern: "alembic\\s+downgrade"
    reason: "Downgrading migrations can cause data loss"
    ask: true

  # Docker destructive operations
  - pattern: "docker\\s+(rm|rmi|system\\s+prune|volume\\s+rm)"
    reason: "Removing Docker resources can delete data"
    ask: true
  - pattern: "docker-compose\\s+down\\s+-v"
    reason: "Removes volumes — destroys persistent data"
    ask: true

  # Package manager destructive operations
  - pattern: "pip\\s+uninstall"
    reason: "Uninstalling packages can break the environment"
    ask: true
  - pattern: "npm\\s+(uninstall|remove)"
    reason: "Removing packages can break the build"
    ask: true

  # Credential/config exposure
  - pattern: "curl.*(-d|--data).*api.key"
    reason: "Potential credential exposure in HTTP request"
    ask: true
  - pattern: "echo.*KEY.*>>"
    reason: "Potential credential write to file"
    ask: true

# ── Files the agent must NEVER read or write ────────────────────

zeroAccessPaths:
  # Secrets and credentials
  - "**/.env"
  - "**/.env.*"
  - "!**/.env.example"
  - "!**/.env.sample"
  - "**/secrets/**"
  - "**/credentials/**"
  - "**/*.pem"
  - "**/*.key"
  - "**/auth.json"
  - "**/.pi/agent/auth.json"

  # SSH and GPG keys
  - "~/.ssh/**"
  - "~/.gnupg/**"

  # Cloud credentials
  - "~/.aws/**"
  - "~/.gcloud/**"
  - "~/.azure/**"
  - "**/terraform.tfstate*"

# ── Files the agent can read but must NEVER modify ──────────────

readOnlyPaths:
  # Lock files (modify via package manager, not directly)
  - "**/package-lock.json"
  - "**/poetry.lock"
  - "**/requirements*.txt"

  # CI/CD configuration (modify with extreme care)
  - "**/.github/**"
  - "**/.gitea/**"
  - "**/Dockerfile*"
  - "**/docker-compose*.yml"

  # Git internals
  - "**/.git/**"

# ── Files the agent must NEVER delete ───────────────────────────

noDeletePaths:
  - "**/.git/**"
  - "**/LICENSE*"
  - "**/CLAUDE.md"
  - "**/AGENTS.md"
  - "**/DOCUMENT_MATRIX.md"
  - "**/docs/templates/**"
  - "**/docs/ORG_DOC_FLOW.md"
  - "**/.pi/**"
  - "**/alembic/versions/**"
