services:
  # Database Services Only - For Local Development
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:15
    container_name: legal-ai-postgres-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis - Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: legal-ai-redis-dev
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Neo4j - Graph Database
  neo4j:
    image: neo4j:5
    container_name: legal-ai-neo4j-dev
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_PORT}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_dev_data:/data
      - neo4j_dev_logs:/logs
      - ./scripts/init-neo4j.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Qdrant - Vector Database
  qdrant:
    # Multi-arch index digest resolved 2026-04-08 (PR FU-2).
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.12.6@sha256:89d9d35757eb57c62973c193c96b5b50ca73bbaff7fa282ef81f7fd155a3747d}
    container_name: legal-ai-qdrant-dev
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: legal-ai-minio-dev
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Valkey/Redis Prometheus exporter (PR FU-4)
  # oliver006/redis_exporter is wire-compatible with Valkey; metric names
  # remain `redis_*`. IT-VK-09 hits :9121/metrics. To use against the dev
  # Valkey container once docker-compose.dev is upgraded, set
  # REDIS_ADDR=redis://<valkey-service>:6379.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: legal-ai-valkey-exporter-dev
    command:
      - "--redis.addr=redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ClamAV - Antivirus (Optional)
  clamav:
    image: clamav/clamav:latest
    container_name: legal-ai-clamav-dev
    ports:
      - "${CLAMAV_PORT}:3310"
    environment:
      - CLAMAV_NO_FRESHCLAM=${CLAMAV_NO_FRESHCLAM}
      - CLAMAV_NO_CLAMD=${CLAMAV_NO_CLAMD}
    volumes:
      - clamav_dev_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:
  neo4j_dev_data:
  neo4j_dev_logs:
  qdrant_dev_data:
  minio_dev_data:
  clamav_dev_data:
