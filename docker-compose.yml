services:
  # Database Services (Start First)
  # PostgreSQL - Primary Database
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    container_name: legal-ai-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=top"
    volumes:
      - postgres_data_pg17:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Valkey - Cache and Message Broker (Redis 7 wire-compatible)
  # Service name kept as `redis` and REDIS_URL unchanged for wire-compat per ADR-002
  # (docs/phase-1/1.3.1_adr_valkey-vs-redis8.md) and Mig Guide 1.0.
  redis:
    image: ${VALKEY_IMAGE:-valkey/valkey:8@sha256:1f84517eca8e0dd9585ed57c572796f32839e1b0e7ce07ad28e6bce098468371}
    container_name: legal-ai-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: valkey-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Neo4j - Graph Database
  neo4j:
    # Pinned per docs/phase-1/1.5.1_dep-review_neo4j.md (PR 1.5.1)
    image: ${NEO4J_IMAGE:-neo4j:5.26-community@sha256:7a7e514888d668103d4a3a28516613ffdbb79f2161f91e49dfbd57c2b7f10d8f}
    container_name: legal-ai-neo4j
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_PORT}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      # PR 1.5.2: NEO4J_PLUGINS bootstrap downloads plugin jars matching the
      # server image version (APOC Core 5.26.x, GDS 2.13.x for server 5.26).
      # See docs/phase-1/1.5.1_dep-review_neo4j.md plugin matrix.
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./scripts/init-neo4j.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # Qdrant - Vector Database
  # Pinned per docs/phase-1/1.4.1_dep-review_qdrant-client.md (PR 1.4.2)
  # Upgrade procedure: docs/phase-1/1.4.2_mig-guide_qdrant-upgrade.md
  # Multi-arch index digest resolved 2026-04-08 via
  # `docker buildx imagetools inspect qdrant/qdrant:v1.12.6` (PR FU-2).
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.12.6@sha256:89d9d35757eb57c62973c193c96b5b50ca73bbaff7fa282ef81f7fd155a3747d}
    container_name: legal-ai-qdrant
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant minimal image has no curl/wget; storage-dir probe preserved from
      # pre-1.12 setup. External readiness is verified via host: curl :6333/readyz
      test: ["CMD", "sh", "-c", "test -d /qdrant/storage && echo 'healthy' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # MinIO - Object Storage
  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: legal-ai-minio
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ClamAV - Antivirus
  clamav:
    image: clamav/clamav:latest@sha256:65ae17252e5fc2605ff0a0ccd18dd2dd43f8aef6591d999cdee2f5b6714b5668
    platform: linux/amd64
    container_name: legal-ai-clamav
    ports:
      - "${CLAMAV_PORT}:3310"
    environment:
      - CLAMAV_NO_FRESHCLAM=${CLAMAV_NO_FRESHCLAM}
      - CLAMAV_NO_CLAMD=${CLAMAV_NO_CLAMD}
    volumes:
      - clamav_data:/var/lib/clamav
      - ./quarantine:/var/quarantine
    healthcheck:
      test: ["CMD", "sh", "-c", "clamdscan --ping || test -f /tmp/clamd.pid"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  # Application Services (Start After Databases)
  # Backend API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal-ai-backend
    environment:
      # Override database connections to use internal Docker ports
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - S3_ENDPOINT=http://minio:9000
      - MINIO_ENDPOINT=minio:9000
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=8000
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=${DEBUG}
      - ENVIRONMENT=${ENVIRONMENT}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    command: >
      sh -c "
        echo 'Waiting for databases to be ready...' &&
        /scripts/wait-for-services.sh &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting backend server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Celery Worker
  celery:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal-ai-celery
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: legal-ai-frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_APP_NAME=${VITE_APP_NAME}
      - VITE_APP_VERSION=${VITE_APP_VERSION}
      - VITE_ENABLE_ANALYTICS=${VITE_ENABLE_ANALYTICS}
      - VITE_ENABLE_DEBUG=${VITE_ENABLE_DEBUG}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data_pg17:
  redis_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  minio_data:
  clamav_data:
  frontend_node_modules:
