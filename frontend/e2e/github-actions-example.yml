# Example GitHub Actions workflow for E2E tests
# Place this in .github/workflows/e2e-tests.yml

name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legalai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Install Playwright
      run: |
        cd frontend
        npx playwright install --with-deps

    - name: Start backend services
      run: |
        cd backend
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/legalai_test
        REDIS_URL: redis://localhost:6379
        ENVIRONMENT: test

    - name: Start frontend development server
      run: |
        cd frontend
        npm run dev &
        sleep 10

    - name: Wait for services
      run: |
        # Wait for backend
        timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'
        # Wait for frontend
        timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'

    - name: Run E2E tests
      run: |
        cd frontend
        npm run test:e2e
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: Upload test videos
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-videos
        path: frontend/test-results/
        retention-days: 7

    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = 'frontend/test-results/results.json';
          
          if (fs.existsSync(path)) {
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const { stats } = results;
            
            const comment = `## E2E Test Results
            
            - ✅ **Passed**: ${stats.expected}
            - ❌ **Failed**: ${stats.unexpected}
            - ⏭️ **Skipped**: ${stats.skipped}
            - 🕐 **Duration**: ${Math.round(stats.duration / 1000)}s
            
            ${stats.unexpected > 0 ? '❌ Some tests failed. Please check the full report.' : '✅ All tests passed!'}
            
            [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  # Separate job for cross-browser testing
  cross-browser-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        npx playwright install ${{ matrix.browser }} --with-deps

    - name: Run cross-browser tests
      run: |
        cd frontend
        npx playwright test --project=${{ matrix.browser }} critical-flows.spec.ts
      env:
        CI: true

    - name: Upload browser-specific results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: ${{ matrix.browser }}-test-results
        path: frontend/test-results/
        retention-days: 7